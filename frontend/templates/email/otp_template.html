<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>OTP for Your Account | {{ otp }}</title>
        <style>
            body {
                font-family: Arial, sans-serif;
                margin: 0;
                padding: 0;
                background-color: #f7f7f7;
            }
            .container {
                max-width: 600px;
                margin: 50px auto;
                padding: 20px;
                background-color: #ffffff;
                border-radius: 8px;
                box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            }
            .header {
                text-align: center;
                margin-bottom: 20px;
            }
            .otp {
                font-size: 24px;
                font-weight: bold;
                color: #007bff;
                text-align: center;
                margin: 20px 0;
            }
            .footer {
                text-align: center;
                font-size: 14px;
                color: #888888;
            }
        </style>
    </head>
    <body>
        <div class="container">
            <div class="header">
                <div style="font-family:Ubuntu, Helvetica, Arial, sans-serif;font-size:20px;font-weight:bold;line-height:1;text-align:center;color:#333333;">OTP Verification</div>
                <br/>
                <div style="font-family:Ubuntu, Helvetica, Arial, sans-serif;font-size:16px;line-height:1;text-align:center;color:#555555;">We received a request to verify your account. Use the OTP code below to sign in securely.</div>
            </div>
            <div
                style="
                    font-family: Ubuntu, Helvetica, Arial, sans-serif;
                    font-size: 13px;
                    line-height: 1;
                    text-align: center;
                    color: #000000;
                "
            >
                <span
                    class="otp-box"
                    style="
                        font-size: 24px;
                        font-weight: bold;
                        letter-spacing: 4px;
                        padding: 10px 20px;
                        border: 2px dashed #4caf50;
                        display: inline-block;
                        border-radius: 5px;
                        background-color: #f9f9f9;
                        text-align: center;
                    "
                    >{{otp}}</span
                >
            </div>
            <div class="footer">
                <p>If you did not request this, please ignore this email.</p>
                <p>Thank you for using our AIORI services!</p>
            </div>
        </div>
    </body>
</html>
