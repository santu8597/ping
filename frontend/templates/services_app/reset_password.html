

{% load static %}

<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>


    <meta charset="utf-8" />
    <title>Reset Password </title>
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <meta content="Premium Multipurpose Admin & Dashboard Template" name="description" />
    <meta content="" name="author" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />

    <!-- App favicon -->
    <link rel="shortcut icon" href="{% static 'images/logo-sm.png' %}">
     <link href="{% static 'css/icons.min.css' %}" rel="stylesheet" type="text/css" />


    <!-- App css -->
    <link href="{% static 'css/bootstrap.min.css' %}" rel="stylesheet" type="text/css" />


    <link rel="stylesheet" href="{% static 'css/message_alert.css' %}">


</head>
{% if messages %}
<ul class="messages">
  {% for message in messages %}
  <li class="alert alert-{{ message.tags }}">
    <span class="message-text">{{ message }}</span>
    <span class="close-btn" id="close-btn">&times;</span>
  </li>

  {% endfor %}
</ul>
{% endif %}
<body id="body" class="auth-page"
    style="background-image: url('/static/images/p-1.png'); background-size: cover; background-position: center center;">


    <!-- Log In page -->
    <div class="container">
        <div class="row vh-100 d-flex justify-content-center">
            <div class="col-12 align-self-center">
                <div class="row">
                    <div class="col-lg-5 mx-auto">
                        <div class="card">
                            <div class="card-body p-0 auth-header-box">
                                <div class="text-center p-3">
                                    <a href="" class="logo logo-admin">
                                        <img src="{% static 'images/logo-sm.png' %}" height="50" alt="logo" class="auth-logo">
                                    </a>
                                    <h4 class="mt-3 mb-1 fw-semibold font-18">Reset Password For AIORI Services Portal</h4>

                                    </p>
                                </div>
                            </div>
                            <div class="card-body pt-0">
                                <form class="my-4" method="POST"  action="{% url 'users:reset-password' %}">
                                    {% csrf_token %}
                                     <input type="hidden" name="uid" value="{{ uid }}">
                                    <input type="hidden" name="token" value="{{ token }}">
                                    <div class="form-group mb-3 position-relative">
                                        <label class="form-label" for="username">New Password</label>
                                        <input type="password" class="form-control" id="password" name="password">
                                        <i class="toggle-password fas fa-eye position-absolute" style="top: 38px; right: 15px; cursor: pointer;" toggle="#password"></i>
                                    </div><!--end form-group-->
                                     <div class="form-group mb-3 position-relative">
                                        <label class="form-label" for="username">Confirm Password</label>
                                        <input type="password" class="form-control" id="password_confirm" name="password_confirm">
                                         <i class="toggle-password fas fa-eye position-absolute" style="top: 38px; right: 15px; cursor: pointer;" toggle="#password_confirm"></i>
                                    </div><!--end form-group-->


                                    <div class="form-group mb-0 row">
                                        <div class="col-12">
                                            <button class="btn btn-primary w-100" type="submit">Submit <i
                                                    class="fas fa-sign-in-alt ms-1"></i></button>
                                        </div><!--end col-->
                                    </div> <!--end form-group-->
                                </form><!--end form-->

                            </div><!--end card-body-->
                            <div class="card-body bg-light-alt text-center">
                                &copy;
                                <script>
                                    document.write(new Date().getFullYear())
                                </script> India Internet Foundation
                            </div>
                        </div><!--end card-->
                    </div><!--end col-->
                </div><!--end row-->
            </div><!--end col-->
        </div><!--end row-->
    </div><!--end container-->
    <!-- vendor js -->

</body>

    <script src="{% static 'libs/bootstrap/js/bootstrap.bundle.min.js' %}"></script>
<script src="{% static 'js/jquery.min.js' %}"></script>
   <script src="{% static 'services_app/js/message_alert.js' %}"></script>
<script>
    document.querySelectorAll(".toggle-password").forEach(function (icon) {
        icon.addEventListener("click", function () {
            const input = document.querySelector(this.getAttribute("toggle"));
            if (input.type === "password") {
                input.type = "text";
                this.classList.remove("fa-eye");
                this.classList.add("fa-eye-slash");
            } else {
                input.type = "password";
                this.classList.remove("fa-eye-slash");
                this.classList.add("fa-eye");
            }
        });
    });
</script>

</html>
